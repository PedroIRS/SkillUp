<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillUp - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="/" style="color: #18E0B5; font-size: 1.5rem;"><strong>SkillUp</strong></a>
        <div>
            <a href="/perfil.html" id="perfilLink" style="display: none;">Perfil</a>
            <a href="/login.html" style="display: none;" id="loginLink"></a>
            <a href="/ranking.html">Ranking</a>
            <a href="/configuracoes.html">Configurações</a>
        </div>
    </nav>

    <main class="loginMain">
        <section class="loginPanel">
            <div class="loginHeader">
                <h2>SkillUp</h2>
                <h2 style="color:#18E0B5">Desafie-se</h2>
            </div>
            <div class="loginPanelContent">
                <h1 style="color: #18E0B5; height: 2rem; margin-bottom: 2rem;">Login</h1>
                <div class="inputBox">
                    <input placeholder="E-mail" type="email" id="loginEmailInput">
                </div>
                <div class="inputBox">
                    <input placeholder="Senha" type="password" id="loginSenhaInput">
                </div>
            </div>
            <p id="mensagemErro" style="display: none; font-size: 0.8rem; color: red;">E-mail ou senha inválidos</p>
            <button onclick="login()">Fazer login</button>
        </section>
        
        <section class="changePath">
            <a href="signin.html">Criar conta</a>
        </section>
    </main>
    
    <script src="script.js"></script>

    <script>
        window.onload = main()

        function main() {
            const loginEmailInput = document.getElementById("loginEmailInput")
            const loginSenhaInput = document.getElementById("loginSenhaInput")
            loginEmailInput.addEventListener("keydown", (e) => {
                if(e.key == "Enter" && loginEmailInput.value && loginSenhaInput.value) {
                    login()
                }
            })
            loginSenhaInput.addEventListener("keydown", (e) => {
                if(e.key == "Enter" && loginEmailInput.value && loginSenhaInput.value) {
                    login()
                }
            })
        }
    </script>
</body>
</html>
